name: Build Aurion Music Player

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Build Linux AppImage
        run: npm run build:linux
      
      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: Aurion-Linux-x64
          path: dist/*.AppImage
          retention-days: 30